name: Bump Formulae

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump formulae
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/bump-formulae.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump formulae"
          title: "chore: bump formulae"
          body: |
            Automated formula version bumps from upstream `v*` release tags.

            Review `version` and `tag:` changes only.
          branch: autobump/formulae
          delete-branch: true
